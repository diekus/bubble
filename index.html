<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#22223b">
  <meta name="application-title" content=" ">
  <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png">
  <title>bubble</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dark.css" rel="stylesheet" media="(prefers-color-scheme: dark)">
  <link rel="stylesheet" href="css/light.css" rel="stylesheet" media="(prefers-color-scheme: light)">
  <link rel="icon" href="images/favicon.png" type="image/x-icon">
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
</head>
<body>
  <header>
    <h1>
        <picture>
          <source srcset="images/icon-192.png" media="(orientation: portrait and max-width: 768px)" />
          <source srcset="images/bubble-logo.png" media="(prefers-color-scheme: light)" />
          <source srcset="images/bubble-logo-dark.png" media="(prefers-color-scheme: dark)" />
          <img src="images/bubble-logo.png" alt="bubble pictures logo" height="50" />
        </picture>
    </h1>
    <label class="file-label">
      <input type="file" id="fileInput" accept="image/*">
      <span>Select Image</span>
    </label>
  </header>
  <main>
    <a-scene embedded>
      <a-sky id="sky" color="white" rotation="0 0 0" animation="property: rotation; to: 0 360 0; loop: true; dur: 200000"></a-sky>
    </a-scene>
  </main>
  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('service-worker.js');
      });
    }
  </script>
</body>
</html>
